# nixpacks.toml — fallback if railway.toml builder is switched back to nixpacks.
# Primary deployment now uses the Dockerfile (builder = "dockerfile" in railway.toml).

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]

[phases.install]
cmds = [
  "pip install uv",
  "uv sync --frozen --no-dev --no-install-project --directory backend",
]

[start]
cmd = "uv run --directory backend uvicorn app.main:app --host 0.0.0.0 --port $PORT"
